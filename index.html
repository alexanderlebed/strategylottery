<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Strategy Lottery</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">

<style>

html,body{
height:100%;
margin:0;
background:#000;
color:#cfc;
font-family:'Roboto Mono', monospace;
overflow:hidden;
}

body{
display:flex;
flex-direction:column;
}

h1{
margin:6px 0;
font-size:20px;
text-align:center;
}

#subtitle{
font-size:12px;
color:#9f9;
text-align:center;
}

#layout{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
width:100%;
}

#leftpanel{
display:flex;
width:95%;
gap:6px;
margin-bottom:6px;
}

.panel{
flex:1;
background:#021;
border:1px solid #0a5;
border-radius:6px;
padding:6px;
font-size:11px;
}

.panel h3{
margin:0;
font-size:11px;
color:#9f9;
}

#lcd{
width:95%;
background:rgba(210,255,210,0.85);
border-radius:10px;
padding:6px;
color:#132;
font-size:12px;
}

#timer{
font-size:18px;
}

.metric{
margin-top:2px;
}

#crowdbar{
height:8px;
background:#111;
border:1px solid #0a5;
margin-top:4px;
}

#crowdlevel{
height:100%;
width:0%;
background:#0f0;
}

#grid{
flex:1;
display:grid;
grid-template-columns:repeat(7,1fr);
grid-auto-rows:1fr;
gap:6px;
width:95%;
margin:6px 0;
}

.number{

display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(#0c0,#050);
border:1px solid #0f0;
border-radius:6px;

color:#000;
font-weight:bold;
font-size:20px;

box-shadow:
0 3px 0 #040,
0 6px 8px rgba(0,0,0,.6),
inset 0 2px 3px rgba(255,255,255,.2);

transition:.08s;

user-select:none;

}

.number:active{

transform:translateY(3px);

box-shadow:
0 1px 0 #030,
0 2px 4px rgba(0,0,0,.6),
inset 0 1px 2px rgba(255,255,255,.2);

}

.mine{
background:linear-gradient(#8ff,#0aa);
color:#002;
}

.cold{opacity:.6}
.warm{opacity:.8}
.hot{opacity:1}
.extreme{color:#f33}

button{

width:92%;
max-width:420px;

padding:14px;

margin-bottom:8px;

background:linear-gradient(#0f0,#060);

border:none;
border-radius:8px;

font-size:20px;
font-weight:bold;

color:#000;

box-shadow:0 4px 0 #030;

}

button:active{
transform:translateY(3px);
box-shadow:0 1px 0 #020;
}

</style>
</head>

<body>

<h1>Strategy Lottery</h1>

<div id="subtitle">
Predict the crowd. Strategy beats luck.
</div>

<div id="layout">

<div id="leftpanel">

<div class="panel">
<h3>CROWD</h3>
<div id="hot"></div>
</div>

<div class="panel">
<h3>LAST</h3>
<div id="history"></div>
</div>

</div>

<div id="lcd">

<div id="timer">120</div>

<div class="metric">PLAYERS 5</div>
<div class="metric">TICKET €1</div>
<div class="metric">JACKPOT €<span id="jackpot">4</span></div>

<div class="metric">STRATEGY <span id="score">0</span></div>
<div class="metric">WIN PROB <span id="prob">0%</span></div>

<div>CROWD</div>

<div id="crowdbar">
<div id="crowdlevel"></div>
</div>

</div>

<div id="grid"></div>

<button onclick="submitTicket()">SUBMIT</button>

</div>

<script>

let players=5
let time=120

let selected=[]
let submitted=false

let popularity=new Array(49).fill(0)
let history=[]
let cells=[]

function vibrate(ms){
if(navigator.vibrate) navigator.vibrate(ms)
}

const grid=document.getElementById("grid")

for(let i=1;i<=49;i++){

let cell=document.createElement("div")

cell.className="number cold"
cell.innerText=i

cell.onclick=()=>{

vibrate(10)

if(selected.includes(i)){

selected=selected.filter(x=>x!==i)
cell.classList.remove("mine")

}else if(selected.length<6){

selected.push(i)
cell.classList.add("mine")

}

}

grid.appendChild(cell)
cells.push(cell)

}

function submitTicket(){

vibrate([20,40,20])

if(selected.length!=6){
alert("Select 6 numbers")
return
}

submitted=true

}

function playWinSound(){

const ctx=new (window.AudioContext||window.webkitAudioContext)()

const notes=[

261.63,329.63,392.00,
523.25,659.25,783.99,
1046.5,1318.5,1568

]

notes.forEach((f,i)=>{

setTimeout(()=>{

let o=ctx.createOscillator()
let g=ctx.createGain()

o.type="sine"
o.frequency.value=f

o.connect(g)
g.connect(ctx.destination)

g.gain.setValueAtTime(.001,ctx.currentTime)
g.gain.exponentialRampToValueAtTime(.4,ctx.currentTime+.02)
g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.8)

o.start()
o.stop(ctx.currentTime+.8)

},i*130)

})

}

function simulate(){

popularity=new Array(49).fill(0)

for(let p=0;p<players;p++){

let nums=[]

while(nums.length<6){

let n=Math.floor(Math.random()*49)+1
if(!nums.includes(n)) nums.push(n)

}

nums.forEach(x=>popularity[x-1]++)

}

if(submitted){
selected.forEach(x=>popularity[x-1]++)
}

}

function heatmap(){

cells.forEach((cell,i)=>{

cell.classList.remove("cold","warm","hot","extreme")

let v=popularity[i]

if(v==0) cell.classList.add("cold")
else if(v==1) cell.classList.add("warm")
else if(v==2) cell.classList.add("hot")
else cell.classList.add("extreme")

})

}

function updateHotCold(){

let arr=[]

for(let i=0;i<49;i++){
arr.push({n:i+1,v:popularity[i]})
}

arr.sort((a,b)=>b.v-a.v)

let top=arr.slice(0,10)

let html=top.map(x=>{

let emoji="🟩"

if(x.v==1) emoji="🟨"
if(x.v>=2) emoji="🟥"

return x.n+" "+emoji

}).join("<br>")

document.getElementById("hot").innerHTML=html

}

function updateHistory(){

document.getElementById("history").innerHTML=
history.map(h=>h.replaceAll("-"," ")).join("<br>")

}

function metrics(){

let sum=0

selected.forEach(n=>sum+=popularity[n-1])

let strategy=Math.max(0,100-sum*4)
let prob=Math.max(5,35-sum*2)

document.getElementById("score").innerText=strategy
document.getElementById("prob").innerText=prob+"%"

let crowd=Math.min(100,sum*6)
document.getElementById("crowdlevel").style.width=crowd+"%"

}

function endRound(){

let winner=[]

while(winner.length<6){
let n=Math.floor(Math.random()*49)+1
if(!winner.includes(n)) winner.push(n)
}

history.unshift(winner.join("-"))

if(history.length>10) history.pop()

updateHistory()

if(submitted && Math.random()<0.15){
playWinSound()
alert("You won this round")
}

submitted=false
selected=[]

cells.forEach(c=>{
c.classList.remove("mine")
})

}

setInterval(()=>{

time--

document.getElementById("timer").innerText="Round ends in "+time

simulate()
heatmap()
updateHotCold()
metrics()

if(time<=0){

endRound()
time=120

}

},1000)

</script>

</body>
</html>
