<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Strategy Lottery</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">

<style>

body{
background:#000;
color:#cfc;
font-family:'Roboto Mono', monospace;
margin:0;
}

#layout{
display:flex;
justify-content:center;
gap:30px;
padding-top:30px;
}

#leftpanel{
width:180px;
}

.panel{
background:#021;
padding:15px;
margin-bottom:15px;
border:1px solid #0a5;
}

.panel h3{
margin-top:0;
font-size:16px;
color:#9f9;
}

#lcd{
background:rgba(210,255,210,0.85);
padding:18px;
border-radius:18px;
color:#132;
width:420px;
box-shadow:0 0 30px rgba(0,255,150,0.3) inset;
}

#timer{
font-size:60px;
letter-spacing:4px;
}

.metric{
font-size:18px;
margin-top:5px;
}

#grid{
display:grid;
grid-template-columns:repeat(7,50px);
gap:8px;
justify-content:center;
margin-top:18px;
}

.number{
width:50px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
border:3px solid transparent;
cursor:pointer;
transition:0.4s;
}

.cold{color:#0f0;}
.warm{color:#aa0;}
.hot{color:#f50;}
.extreme{color:#f00;}

.mine{
border:3px solid #7fffd4;
box-shadow:0 0 8px #7fffd4;
}

.blink{
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.2}
100%{opacity:1}
}

button{
margin-top:12px;
padding:10px 24px;
background:black;
border:2px solid #0f0;
color:#0f0;
font-family:'Roboto Mono';
cursor:pointer;
}

.flash{
animation:flash .4s 3;
}

@keyframes flash{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.winflash{
animation:winflash .4s 3;
}

@keyframes winflash{
0%{opacity:1}
50%{opacity:0.1}
100%{opacity:1}
}

</style>
</head>

<body>

<div style="color:#9f9; text-align:center; max-width:520px; margin:auto; margin-top:10px; font-size:15px; line-height:1.4;">

<b>HOW TO WIN</b><br><br>

1. Select 6 numbers<br>
2. Try to avoid numbers other players choose<br>
3. The least popular combination wins the jackpot<br><br>

You are playing against <b>5 competing players</b>.

</div>

<div id="layout">

<div id="leftpanel">

<div class="panel">
<h3>HOT</h3>
<div id="hot"></div>
</div>

<div class="panel">
<h3>COLD</h3>
<div id="cold"></div>
</div>

<div class="panel">
<h3>LAST ROUNDS</h3>
<div id="history"></div>
</div>

</div>

<div>

<div id="lcd">

<div id="timer">120</div>

<div class="metric">PLAYERS <span id="players">5</span></div>
<div class="metric">TICKET €1</div>
<div class="metric">JACKPOT €<span id="jackpot">4</span></div>

<div class="metric">STRATEGY <span id="score">0</span></div>
<div class="metric">WIN PROB <span id="prob">0%</span></div>

</div>

<div id="grid"></div>

<button onclick="submitTicket()" id="submit">SUBMIT</button>

</div>

</div>

<script>

let players=5
let jackpot=Math.floor(players*0.8)
let operator=Math.floor(players*0.2)

let time=120

let selected=[]
let replaceTarget=null
let submitted=false

let popularity=new Array(49).fill(0)

let history=[]

let cells=[]

const grid=document.getElementById("grid")

for(let i=1;i<=49;i++){

let cell=document.createElement("div")

cell.className="number cold"

cell.innerText=i.toString().padStart(2,"0")

cell.onclick=()=>clickNumber(i)

grid.appendChild(cell)

cells.push(cell)

}

function clickNumber(n){

let cell=cells[n-1]

if(!submitted){

if(selected.includes(n)){

selected=selected.filter(x=>x!==n)
cell.classList.remove("mine")

}else if(selected.length<6){

selected.push(n)
cell.classList.add("mine")
cell.classList.add("blink")

}

}

else{

if(replaceTarget==null){

if(selected.includes(n)){

replaceTarget=n

}

}

else{

cells[replaceTarget-1].classList.remove("mine")

let idx=selected.indexOf(replaceTarget)

selected[idx]=n

cell.classList.add("mine")

replaceTarget=null

}

}

}

function submitTicket(){

if(selected.length!=6){

alert("Select 6 numbers")
return

}

submitted=true

cells.forEach(c=>c.classList.remove("blink"))

document.getElementById("submit").classList.add("flash")

}

function simulate(){

popularity=new Array(49).fill(0)

let tickets=[]

for(let p=0;p<players;p++){

let nums=[]

while(nums.length<6){

let n=Math.floor(Math.random()*49)+1

if(!nums.includes(n)) nums.push(n)

}

nums.forEach(x=>popularity[x-1]++)

tickets.push(nums.sort((a,b)=>a-b).join("-"))

}

if(submitted){

selected.forEach(x=>popularity[x-1]++)

tickets.push(selected.slice().sort((a,b)=>a-b).join("-"))

}

let freq={}

tickets.forEach(t=>{

if(!freq[t]) freq[t]=0
freq[t]++

})

let min=999
let winner=null

for(let t in freq){

if(freq[t]<min){

min=freq[t]
winner=t

}

}

return winner

}

function heatmap(){

cells.forEach((cell,i)=>{

cell.classList.remove("cold","warm","hot","extreme")

let v=popularity[i]

if(v==0) cell.classList.add("cold")
else if(v==1) cell.classList.add("warm")
else if(v==2) cell.classList.add("hot")
else cell.classList.add("extreme")

})

}

function updateHotCold(){

let arr=[]

for(let i=0;i<49;i++){

arr.push({n:i+1,v:popularity[i]})

}

arr.sort((a,b)=>b.v-a.v)

let hot=arr.slice(0,5)
let cold=arr.slice(-5)

document.getElementById("hot").innerHTML=
hot.map(x=>x.n.toString().padStart(2,"0")+" 🔥").join("<br>")

document.getElementById("cold").innerHTML=
cold.map(x=>x.n.toString().padStart(2,"0")+" ❄").join("<br>")

}

function metrics(){

let sum=0

selected.forEach(n=>sum+=popularity[n-1])

document.getElementById("score").innerText=Math.max(0,100-sum*4)

document.getElementById("prob").innerText=Math.max(5,35-sum*2)+"%"

}

function updateHistory(){

document.getElementById("history").innerHTML=
history.map(h=>h.replaceAll("-"," ")).join("<br>")

}

function endRound(){

let winner=simulate()

let playerTicket=selected.slice().sort((a,b)=>a-b).join("-")

let playerWins=false

if(submitted && Math.random()<0.15){

winner=playerTicket
playerWins=true

}

history.unshift(winner)

if(history.length>10) history.pop()

updateHistory()

if(playerWins){

let prize=jackpot

document.getElementById("jackpot").classList.add("winflash")

for(let i=0;i<3;i++){
setTimeout(piano,i*600)
}

setTimeout(()=>{
alert("YOU WIN €"+prize)
},1200)

jackpot=Math.floor(players*0.8)
operator+=Math.floor(players*0.2)

document.getElementById("jackpot").innerText=jackpot

}else{

jackpot+=Math.floor(players*0.8)
operator+=Math.floor(players*0.2)

document.getElementById("jackpot").innerText=jackpot

piano()

}

submitted=false
selected=[]

cells.forEach(c=>{
c.classList.remove("mine")
c.classList.remove("blink")
})

}

setInterval(()=>{

time--

document.getElementById("timer").innerText=time

simulate()

heatmap()

updateHotCold()

metrics()

if(time<=0){

endRound()

time=120

}

},1000)

function piano(){

let notes=["C4","E4","G4"]

notes.forEach((n,i)=>{

setTimeout(()=>{

let audio=new Audio(
"https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/MusyngKite/acoustic_grand_piano-mp3/"+n+".mp3"
)

audio.play()

},i*200)

})

}

</script>

</body>
</html>
